services:
  # ─────────────────────────────────────────
  # 1. TFX Pipeline Development (JupyterLab)
  # ─────────────────────────────────────────
  tfx-notebook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfahrur6045-tfx
    ports:
      - "8888:8888"
    volumes:
      - ./notebook:/workspace/notebook
      - ./modules:/workspace/modules
      - ./data:/workspace/data
      - ./pipelines:/workspace/pipelines
      - ./metadata:/workspace/metadata
      - ./serving_model:/workspace/serving_model
    environment:
      - KAGGLE_USERNAME=${KAGGLE_USERNAME}
      - KAGGLE_KEY=${KAGGLE_KEY}
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 2. TensorFlow Serving
  # ─────────────────────────────────────────
  tf-serving:
    image: tensorflow/serving:latest
    container_name: rfahrur6045-serving
    ports:
      - "8500:8500"
      - "8501:8501"
    volumes:
      - ./serving_model/rfahrur6045-pipeline:/models/ecommerce_churn
    environment:
      - MODEL_NAME=ecommerce_churn
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 3. Prometheus
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rfahrur6045-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    depends_on:
      - tf-serving
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 4. Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rfahrur6045-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 5. Node Exporter
  # ─────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: rfahrur6045-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data: