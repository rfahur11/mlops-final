# railway.toml - Konfigurasi deployment Railway
[build]
builder = "dockerfile"
dockerfilePath = "serving/Dockerfile"

[deploy]
startCommand = "tensorflow_model_server --rest_api_port=$PORT --model_name=ecommerce_churn --model_base_path=/models/ecommerce_churn"
healthcheckPath = "/v1/models/ecommerce_churn"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
