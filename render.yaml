services:
  # ========================================
  # Option 1: TensorFlow Serving (Production)
  # ========================================
  - type: web
    name: ecommerce-churn-serving
    runtime: docker
    region: singapore
    plan: starter
    
    # Build & Deploy Settings
    dockerfilePath: ./serving/Dockerfile
    dockerContext: .
    
    # Environment & Port
    envVars:
      - key: MODEL_NAME
        value: ecommerce_churn
      - key: PORT
        value: 8501
    
    # Health Check
    healthCheckPath: /v1/models/ecommerce_churn/metadata
    healthCheckInterval: 30
    
    # Deployment
    maxInstances: 1
    numInstances: 1
    
    # Auto-deploy on git push
    autoDeploy: true

  # ========================================
  # Option 2: TFX Jupyter Notebook (Optional)
